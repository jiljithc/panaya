<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Bank App</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px;}
        .balance { font-size: 24px; color: #2e7d32; font-weight: bold; }
        .message { margin-top: 15px; padding: 10px; background: #e3f2fd; border-radius: 4px; color: #1565c0; font-weight: bold; }
        .form-group { margin-top: 15px; display: flex; gap: 10px; align-items: center;}
        input[type="number"], input[type="text"] { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px;}
        button { padding: 10px 15px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; color: white; }
        .btn-deposit { background-color: #2e7d32; }
        .btn-withdraw { background-color: #d32f2f; }
        .btn-transfer { background-color: #f57c00; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>

    <div class="card">
        <h1>My Account</h1>
        <p><strong>Account Holder:</strong> <span th:text="${account.accountHolderName}"></span></p>
        <p><strong>Account Number:</strong> <span th:text="${account.accountNumber}"></span></p>
        <p class="balance">Current Balance: $<span th:text="${#numbers.formatDecimal(account.balance, 1, 2)}"></span></p>

        <div class="message" th:text="${account.statusMessage}"></div>

        <form class="form-group" action="/transaction" method="post">
            <input type="number" name="amount" step="0.01" min="0.01" required placeholder="Amount ($)">
            <button type="submit" name="action" value="deposit" class="btn-deposit">Deposit</button>
            <button type="submit" name="action" value="withdraw" class="btn-withdraw">Withdraw</button>
        </form>

        <form class="form-group" action="/transaction" method="post" style="margin-top: 25px; padding-top: 15px; border-top: 1px solid #eee;">
            <input type="text" name="targetAccountNumber" required placeholder="Target Account # (Try 1002)">
            <input type="number" name="amount" step="0.01" min="0.01" required placeholder="Amount ($)">
            <button type="submit" name="action" value="transfer" class="btn-transfer">Transfer Funds</button>
        </form>
    </div>

    <div class="card">
        <h2>Transaction History</h2>
        <table>
            <thead>
                <tr>
                    <th>Date & Time</th>
                    <th>Type</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="tx : ${account.transactionHistory}">
                    <td th:text="${tx.timestamp}"></td>
                    <td th:text="${tx.type}"></td>
                    <td>$<span th:text="${#numbers.formatDecimal(tx.amount, 1, 2)}"></span></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
